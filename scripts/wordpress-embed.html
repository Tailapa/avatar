<!-- Avatar Embed Snippet for WordPress -->
<!-- Set BASE to your avatar app's URL (e.g., https://avatar.yourdomain.com) -->
<script>
const BASE = 'https://your-avatar-app.fly.dev';

// Pass ?q= from host page to iframe
const hostQ = new URLSearchParams(window.location.search).get('q');
const src = hostQ ? `${BASE}/?q=${hostQ}` : BASE + '/';

document.write(
  `<div style="width:100%;max-width:820px;margin:0 auto;overflow-x:hidden">` +
  `<iframe src="${src}" title="Digital Twin Avatar" ` +
  `style="width:100%;height:700px;border:none;display:block" ` +
  `allow="clipboard-write"></iframe></div>`
);
</script>
